<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 카테고리</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex h-screen w-full border-4 border-black overflow-hidden">
      <aside class="w-1/5 bg-white border-r-4 border-black flex flex-col p-6 gap-6">
        <a href="./admin_open.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold hover:bg-gray-200">관리자메뉴</button>
        </a>

        <a href="./admin_category.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold bg-blue-600 text-white">카테고리관리</button>
        </a>

        <a href="./admin_song.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold hover:bg-gray-200">노래 관리</button>
        </a>

        <a href="./admin_request.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold hover:bg-gray-200">노래 신청 관리</button>
        </a>
      </aside>

      <main class="flex-1 bg-white p-8 relative overflow-y-auto">
        <div class="flex justify-end mb-10">
          <button id="addCategoryBtn" class="px-6 py-2 border-2 border-black font-bold text-lg hover:bg-black hover:text-white transition">카테고리 추가 +</button>
        </div>

        <div class="space-y-4 max-w-4xl">
          <div id="categoryList"></div>
        </div>
      </main>

      <div id="modal" class="fixed inset-0 bg-black hidden flex items-center justify-center z-50">
        <div class="bg-white border-4 border-black p-8 w-[400px]">
          <h2 class="text-2xl font-black mb-6 uppercase">신규 카테고리 등록</h2>

          <div class="space-y-4 text-lg">
            <div>
              <label class="block font-black mb-1">노래 카테고리</label>
              <input type="text" id="titleInput" class="w-full border-2 border-black p-2 outline-none focus:bg-yellow-50 font-bold" />
            </div>
          </div>

          <div class="flex justify-end gap-4 mt-8">
            <button id="closeCategoryBtn" class="px-4 py-2 border-2 border-black font-bold hover:bg-gray-100">닫기</button>
            <button id="saveCategoryBtn" class="px-6 py-2 bg-black text-white font-bold hover:bg-gray-800">저장</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let category = JSON.parse(localStorage.getItem('myCategory')) || [{ title: '가요' }, { title: 'POP' }, { title: 'JPOP' }, { title: '발라드' }, { title: '댄스' }, { title: '트로트' }, { title: '포크' }, { title: 'OST' }, { title: '락/메탈' }, { title: '랩/힙합' }, { title: 'R&B/어반' }];
      let editIndex = null;
      const modal = document.getElementById('modal');
      const categoryList = document.getElementById('categoryList');

      const saveCategory = () => {
        localStorage.setItem('myCategory', JSON.stringify(category));
      };

      const addCategoryBtn = document.getElementById('addCategoryBtn');
      addCategoryBtn.addEventListener('click', () => {
        editIndex = null;
        modal.classList.remove('hidden');
      });

      const closeCategoryBtn = document.getElementById('closeCategoryBtn');
      closeCategoryBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
      });

      const renderCategory = () => {
        categoryList.innerHTML = '';

        category.forEach((item, index) => {
          const mainCreate = document.createElement('main');
          mainCreate.className = ' flex-1 bg-white p-8 relative overflow-y-auto';

          const divCreate = document.createElement('div');
          divCreate.className = 'categoryBox flex mb-4 justify-between items-center p-4 border-2 border-black bg-white group hover:bg-gray-50';

          const spanTitle = document.createElement('span');
          spanTitle.className = 'text-xl font-bold';
          spanTitle.textContent = item.title;

          const btnManage = document.createElement('div');
          btnManage.className = 'flex items-center gap-4';

          const scrollBtn = document.createElement('button');
          scrollBtn.className = 'categoryScrollBtn upDown text-2xl hover:scale-125';
          scrollBtn.textContent = '≡';

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'categoryDeleteBtn text-2xl hover:text-red-500 hover:scale-125';
          deleteBtn.textContent = '✘';

          deleteBtn.addEventListener('click', function () {
            deleteCategory(index);
          });

          const editBtn = document.createElement('button');
          editBtn.className = 'categoryEditBtn text-l hover:text-blue-500 hover:scale-125';
          editBtn.textContent = 'EDIT';
          editBtn.addEventListener('click', function () {
            editIndex = index;
            document.querySelector('#modal h2').textContent = '카테고리 수정';
            document.getElementById('titleInput').value = item.title;
            modal.classList.remove('hidden');
          });

          divCreate.draggable = false;
          scrollBtn.addEventListener('mouseenter', () => (divCreate.draggable = true));
          scrollBtn.addEventListener('mouseleave', () => (divCreate.draggable = false));

          divCreate.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('whichBox', index);

            divCreate.classList.add('opacity-40');
          });

          divCreate.addEventListener('dragover', (e) => {
            e.preventDefault();
          });

          divCreate.addEventListener('drop', (e) => {
            e.preventDefault();

            const whichBox = parseInt(e.dataTransfer.getData('whichBox'));
            const indexBox = index;

            if (!isNaN(whichBox) && whichBox !== indexBox) {
              const clickedBox = category.splice(whichBox, 1)[0];
              category.splice(indexBox, 0, clickedBox);

              saveCategory();
              renderCategory();
            }
          });

          divCreate.addEventListener('dragend', () => {
            divCreate.classList.remove('opacity-40');
            divCreate.draggable = false;
          });
          btnManage.append(scrollBtn, deleteBtn, editBtn);
          divCreate.append(spanTitle, btnManage);

          categoryList.appendChild(divCreate);
          const categoryDeleteBtn = document.querySelectorAll('.categoryDeleteBtn');
        });
      };
      const saveCategoryBtn = document.getElementById('saveCategoryBtn');
      saveCategoryBtn.addEventListener('click', () => {
        const titleInput = document.getElementById('titleInput');
        const title = titleInput.value;

        if (title) {
          if (editIndex !== null) {
            category[editIndex].title = title;
            editIndex = null;
          } else {
            category.push({ title: title });
          }
          renderCategory();
          modal.classList.add('hidden');
          titleInput.value = '';
          document.querySelector('#modal h2').textContent = '신규 카테고리 등록';
        } else {
          alert('내용이 입력되지 않았습니다!');
        }
      });

      const deleteCategory = (index) => {
        if (confirm('이 카테고리를 정말 삭제할까요?')) {
          category.splice(index, 1);

          renderCategory();
        }
      };

      renderCategory();
    </script>
  </body>
</html>
