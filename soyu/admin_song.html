<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>노래 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="flex h-screen w-full border-4 border-black overflow-hidden">
      <aside class="w-1/5 bg-white border-r-4 border-black flex flex-col p-6 gap-6">
        <a href="./admin_open.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold hover:bg-gray-200">관리자메뉴</button>
        </a>
        <a href="./admin_category.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold hover:bg-gray-200">카테고리관리</button>
        </a>
        <a href="./admin_song.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold bg-blue-600 text-white">노래 관리</button>
        </a>
        <a href="./admin_request.html" class="block w-full">
          <button class="w-full py-4 border-2 border-black font-bold hover:bg-gray-200">노래 신청 관리</button>
        </a>
      </aside>

      <main class="flex-1 bg-white p-8 overflow-y-auto">
        <div class="flex justify-between items-center w-full mb-8">
          <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black">노래 관리</h1>
            <button id="selectCategoryBtn" class="px-6 py-2 border-2 border-black font-bold text-lg hover:bg-black hover:text-white transition">카테고리 선택</button>

            <button id="addSongBtn" class="px-6 py-2 ml-auto border-2 border-black font-bold text-lg hover:bg-black hover:text-white transition">곡 추가 +</button>
          </div>
        </div>
        <div class="border-4 border-black">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-200 border-b-4 border-black font-bold">
                <th class="p-4 border-r-2 border-black w-20 text-center">순위</th>
                <th class="p-4 border-r-2 border-black">제목</th>
                <th class="p-4 border-r-2 border-black">가수</th>
                <th class="p-4 border-r-2 border-black w-32 text-center">점수</th>
                <th class="p-4 text-center w-48">관리</th>
              </tr>
            </thead>
            <tbody id="songList"></tbody>
          </table>
        </div>
      </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black hidden flex items-center justify-center z-50">
      <div class="bg-white border-4 border-black p-8 w-[400px]">
        <h2 id="newSong" class="text-2xl font-black mb-6 uppercase">신규 노래 등록</h2>

        <div class="space-y-4 text-lg">
          <div>
            <label class="block font-black mb-1">제목</label>
            <input type="text" id="titleInput" class="w-full border-2 border-black p-2 outline-none focus:bg-yellow-50 font-bold" />
          </div>
          <div>
            <label class="block font-black mb-1">가수</label>
            <input type="text" id="artistInput" class="w-full border-2 border-black p-2 outline-none focus:bg-yellow-50 font-bold" />
          </div>
          <div>
            <label class="block font-black mb-1">SCORE</label>
            <input type="number" id="scoreInput" class="w-full border-2 border-black p-2 outline-none focus:bg-yellow-50 font-bold" value="0" />
          </div>
        </div>

        <div class="flex justify-end gap-4 mt-8">
          <button id="closeSongBtn" class="px-4 py-2 border-2 border-black font-bold hover:bg-gray-100">닫기</button>
          <button id="saveSongBtn" class="px-6 py-2 bg-black text-white font-bold hover:bg-gray-800">저장</button>
        </div>
      </div>
    </div>

    <script>
      let songs = JSON.parse(localStorage.getItem('mySongs')) || [
        { title: 'Hysteria', artist: 'MUSE', score: 95 },
        { title: 'Plug In Baby', artist: 'MUSE', score: 88 },
      ];
      let editIndex = null;
      const modal = document.getElementById('modal');
      const songList = document.getElementById('songList');
      const modalTitle = document.getElementById('newSong');

      const saveSongs = () => {
        localStorage.setItem('mySongs', JSON.stringify(songs));
      };

      const addSongBtn = document.getElementById('addSongBtn');
      addSongBtn.addEventListener('click', () => {
        editIndex = null;
        modalTitle.textContent = '신규 노래 등록';
        document.getElementById('titleInput').value = '';
        document.getElementById('artistInput').value = '';
        document.getElementById('scoreInput').value = 0;
        modal.classList.remove('hidden');
      });
      const closeSongBtn = document.getElementById('closeSongBtn');
      closeSongBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
      });

      const renderSongs = () => {
        songList.innerHTML = '';

        songs.sort((a, b) => b.score - a.score || a.title.localeCompare(b.title));

        songs.forEach((song, index) => {
          const trCreate = document.createElement('tr');
          trCreate.className = 'border-b-2 border-black hover:bg-gray-50';

          const tdRank = document.createElement('td');
          tdRank.className = 'p-4 border-r-2 border-black text-center font-bold';
          tdRank.textContent = index + 1;

          const tdTitle = document.createElement('td');
          tdTitle.className = 'p-4 border-r-2 border-black font-bold';
          tdTitle.textContent = song.title;

          const tdArtist = document.createElement('td');
          tdArtist.className = 'p-4 border-r-2 border-black';
          tdArtist.textContent = song.artist;

          const tdScore = document.createElement('td');
          tdScore.className = 'p-4 border-r-2 border-black text-center font-black text-blue-600';
          tdScore.textContent = song.score;

          const tdManage = document.createElement('td');
          tdManage.className = 'p-4 flex justify-center items-center gap-4 text-xl font-bold';

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'hover:text-red-500 hover:scale-125 transition';
          deleteBtn.textContent = '✘';

          deleteBtn.addEventListener('click', function (click) {
            deleteSong(index);
          });

          const editBtn = document.createElement('button');
          editBtn.className = 'text-sm border-2 border-black px-2 py-1 hover:bg-black hover:text-white';
          editBtn.textContent = 'EDIT';

          editBtn.addEventListener('click', function () {
            editIndex = index;
            modalTitle.textContent = '노래 수정';
            document.getElementById('titleInput').value = song.title;
            document.getElementById('artistInput').value = song.artist;
            document.getElementById('scoreInput').value = song.score;
            modal.classList.remove('hidden');
          });

          tdManage.append(deleteBtn, editBtn);
          trCreate.append(tdRank, tdTitle, tdArtist, tdScore, tdManage);

          songList.appendChild(trCreate);
        });
      };

      const saveSongBtn = document.getElementById('saveSongBtn');
      saveSongBtn.addEventListener('click', () => {
        const title = document.getElementById('titleInput').value;
        const artist = document.getElementById('artistInput').value;
        const score = parseInt(document.getElementById('scoreInput').value);

        if (title && artist && score) {
          if (editIndex !== null) {
            songs[editIndex] = { title, artist, score };
            editIndex = null;
          } else {
            songs.push({ title, artist, score });
          }
          saveSongs();
          renderSongs();
          modal.classList.add('hidden');
        } else {
          alert('내용이 입력되지 않았습니다!');
        }
      });

      window.deleteSong = (index) => {
        if (confirm('이 노래를 삭제하시겠습니까?')) {
          songs.splice(index, 1);

          renderSongs();
        }
      };

      renderSongs();
    </script>
  </body>
</html>
